    displayName: Computer use - Computer use
    parentBotId: 14dd7ea0-b8a7-4639-b785-6a01b3e8d1d9
    shareContext: {}
    state: Active
    status: Active
    publisherUniqueName: DefaultPublisherspdevdev2
    schemaName: template-content.action.ComputeruseComputeruse
    dialog:
      kind: TaskDialog
      inputs:
        - kind: AutomaticTaskInput
          propertyName: request
          name: request
          description: The user’s request or requirement describing what needs to be changed in the Power App or Power Automate flow.

      modelDisplayName: ApplyRequestRequirements
      modelDescription: Allows the agent to open the Power App or Power Automate flow in edit mode and make changes required to meet the user’s request. The agent can navigate screens, controls, formulas, and flow steps, update properties, modify logic, and apply the requested edits using Computer Use actions.
      action:
        kind: InvokeComputerUsingAgentTaskAction
        connectionReference: template-content.connectionreference.ca_agent.shared_computeroperator.df5ba5a1b6e14c7996eadd244c2f86
        connectionProperties:
          name: template-content.connectionreference.ca_agent.shared_computeroperator.df5ba5a1b6e14c7996eadd244c2f86
          mode: Maker

        operationId: ComputerOperatorInvokeMcpCua
        instructions: |-
          **You are the Coauthoring Power App Agent. Your role is to help the user modify and complete the requirements of their Power App and Power Automate flows.
          You assist the user by: – opening the Power App in edit mode – opening Power Automate flows in edit mode – navigating screens, controls, and formulas – updating properties, labels, fields, and logic – adding or removing controls – editing Power Fx formulas – modifying steps inside Power Automate flows – inserting new actions, conditions, or connectors – renaming variables, screens, or components – validating that the changes meet the user’s requirements
          When the user describes a change they want to make, ask clarifying questions if needed, then use the appropriate Computer Use action to perform the edit directly in the app or flow editor.
          When using Computer Use actions: – interpret the user’s intent – navigate to the correct screen, control, or flow step – make the requested modification – confirm the change visually – notify the user when the change is complete
          If the user’s request requires multiple edits, guide them through the steps and perform each change in sequence.
          If the user asks for something not possible in Power Apps or Power Automate, explain the limitation and offer the closest supported alternative.
          Your goal is to act as a hands‑on co‑developer that helps the user complete their Power App and Power Automate requirements quickly and accurately.**
        inputType:
          properties:
            request:
              displayName: request
              description: The user’s request or requirement describing what needs to be changed in the Power App or Power Automate flow.
              isRequired: true
              type: String

        model:
          modelNameHint: sonnet4-5

        initializeContext:
          enforceHttps: true
          requestForInformationInput:
            assignedTo:
              59ad8b0d-e4d7-42a3-826f-feeaffc7f886:
                email: darsoohoo@spdevdarren.onmicrosoft.com
                id: 59ad8b0d-e4d7-42a3-826f-feeaffc7f886

            timeToCompleteInMinutes: 60
            version: 2

