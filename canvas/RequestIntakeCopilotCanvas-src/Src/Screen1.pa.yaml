Screens:
  Screen1:
    Children:
      - lblHeader:
          Control: ModernText@1.0.0
          Properties:
            Height: =42
            Size: =28
            Text: ="Request Intake Copilot"
            Width: =640
            X: =48
            Y: =24
      - lblSubHeader:
          Control: ModernText@1.0.0
          Properties:
            Height: =30
            Size: =14
            Text: ="Agent-guided canvas intake that turns a rough request into triage-ready fields."
            Width: =820
            X: =50
            Y: =68
      - lblRequestTitle:
          Control: ModernText@1.0.0
          Properties:
            Height: =26
            Text: ="Request title"
            Width: =300
            X: =48
            Y: =112
      - txtRequestTitle:
          Control: ModernTextInput@1.1.0
          Properties:
            Height: =44
            Placeholder: ="Short title for the request"
            Width: =570
            X: =48
            Y: =140
      - lblProblem:
          Control: ModernText@1.0.0
          Properties:
            Height: =26
            Text: ="Problem or request"
            Width: =300
            X: =48
            Y: =198
      - txtProblem:
          Control: ModernTextInput@1.1.0
          Properties:
            Height: =100
            Placeholder: ="Describe what is happening, what you need, or what changed."
            Type: =TextInputType.Multiline
            Width: =570
            X: =48
            Y: =226
      - lblBusinessImpact:
          Control: ModernText@1.0.0
          Properties:
            Height: =26
            Text: ="Business impact"
            Width: =300
            X: =48
            Y: =342
      - txtBusinessImpact:
          Control: ModernTextInput@1.1.0
          Properties:
            Height: =70
            Placeholder: ="Who is affected, how often, and what is blocked?"
            Type: =TextInputType.Multiline
            Width: =570
            X: =48
            Y: =370
      - lblAdditionalInfo:
          Control: ModernText@1.0.0
          Properties:
            Height: =26
            Text: ="Additional context"
            Width: =300
            X: =48
            Y: =456
      - txtAdditionalInfo:
          Control: ModernTextInput@1.1.0
          Properties:
            Height: =80
            Placeholder: ="Systems, URLs, screenshots, deadlines, examples, or constraints."
            Type: =TextInputType.Multiline
            Width: =570
            X: =48
            Y: =484
      - btnAnalyze:
          Control: ModernButton@1.0.0
          Properties:
            Height: =44
            OnSelect: |
              =Set(varInputText, Lower(txtProblem.Text & " " & txtBusinessImpact.Text & " " & txtAdditionalInfo.Text));
              Set(varCategory, If(IsBlank(Trim(txtProblem.Text)), "Needs problem statement", If(Or("login" in varInputText, "access" in varInputText, "permission" in varInputText, "role" in varInputText), "Access / permissions", If(Or("bug" in varInputText, "error" in varInputText, "broken" in varInputText, "fail" in varInputText), "Bug / defect", If(Or("report" in varInputText, "dashboard" in varInputText, "data" in varInputText), "Reporting / data", If(Or("automation" in varInputText, "workflow" in varInputText, "approval" in varInputText), "Automation / workflow", "Enhancement / discovery"))))));
              Set(varEffort, If(IsBlank(Trim(txtProblem.Text)), "", If(Or("outage" in varInputText, "blocked" in varInputText, "urgent" in varInputText, "security" in varInputText), "Large / urgent triage", If(Len(varInputText) > 450, "Medium: 3-5 days", "Small: 1-2 days"))));
              Set(varTimeline, If(IsBlank(Trim(txtProblem.Text)), "", If(Or("urgent" in varInputText, "outage" in varInputText, "blocked" in varInputText), "Start today", If(Len(varInputText) > 450, "This sprint after discovery", "Next available triage slot"))));
              Set(varQuestion, If(IsBlank(Trim(txtProblem.Text)), "Start by describing the problem in one or two sentences.", "Follow-up: who is affected, what happens today, and what would a good result look like?"));
              Set(varDeveloperNotes, If(IsBlank(Trim(txtProblem.Text)), "Ask the requester for the core problem, affected users, business impact, and desired outcome before triage.", "Developer notes: confirm affected users, repro steps, priority, target system, desired outcome, and deadline. Signals found: " & varCategory & "; " & varEffort & "; " & varTimeline & ". Extra context: " & txtAdditionalInfo.Text));
              Reset(txtCategory);
              Reset(txtEffort);
              Reset(txtTimeline);
              Reset(txtDeveloperNotes)
            Text: ="Analyze request"
            Width: =180
            X: =48
            Y: =590
      - btnClear:
          Control: ModernButton@1.0.0
          Properties:
            Height: =44
            OnSelect: |
              =Set(varCategory, "");
              Set(varEffort, "");
              Set(varTimeline, "");
              Set(varQuestion, "");
              Set(varDeveloperNotes, "");
              Reset(txtRequestTitle);
              Reset(txtProblem);
              Reset(txtBusinessImpact);
              Reset(txtAdditionalInfo);
              Reset(txtCategory);
              Reset(txtEffort);
              Reset(txtTimeline);
              Reset(txtDeveloperNotes)
            Text: ="Clear"
            Width: =130
            X: =246
            Y: =590
      - lblAgentQuestion:
          Control: ModernText@1.0.0
          Properties:
            Height: =72
            Size: =14
            Text: |
              ="Agent prompt: " & Coalesce(varQuestion, "Describe the request, then use Analyze request to generate triage fields.")
            Width: =570
            X: =48
            Y: =650
      - lblAutoFields:
          Control: ModernText@1.0.0
          Properties:
            Height: =34
            Size: =20
            Text: ="Auto-filled request fields"
            Width: =520
            X: =680
            Y: =112
      - lblCategory:
          Control: ModernText@1.0.0
          Properties:
            Height: =24
            Text: ="Category"
            Width: =260
            X: =680
            Y: =154
      - txtCategory:
          Control: ModernTextInput@1.1.0
          Properties:
            Default: =Coalesce(varCategory, "")
            Height: =44
            Placeholder: ="Generated category"
            Width: =285
            X: =680
            Y: =182
      - lblEffort:
          Control: ModernText@1.0.0
          Properties:
            Height: =24
            Text: ="Estimated effort"
            Width: =260
            X: =995
            Y: =154
      - txtEffort:
          Control: ModernTextInput@1.1.0
          Properties:
            Default: =Coalesce(varEffort, "")
            Height: =44
            Placeholder: ="Generated effort"
            Width: =280
            X: =995
            Y: =182
      - lblTimeline:
          Control: ModernText@1.0.0
          Properties:
            Height: =24
            Text: ="Likely timeline"
            Width: =260
            X: =680
            Y: =246
      - txtTimeline:
          Control: ModernTextInput@1.1.0
          Properties:
            Default: =Coalesce(varTimeline, "")
            Height: =44
            Placeholder: ="Generated timeline"
            Width: =595
            X: =680
            Y: =274
      - lblDeveloperNotes:
          Control: ModernText@1.0.0
          Properties:
            Height: =24
            Text: ="Additional developer notes"
            Width: =420
            X: =680
            Y: =338
      - txtDeveloperNotes:
          Control: ModernTextInput@1.1.0
          Properties:
            Default: =Coalesce(varDeveloperNotes, "")
            Height: =126
            Placeholder: ="Generated notes for developers"
            Type: =TextInputType.Multiline
            Width: =595
            X: =680
            Y: =366
      - lblChecklist:
          Control: ModernText@1.0.0
          Properties:
            Height: =176
            Size: =14
            Text: |
              ="Developer handoff checklist" & Char(10) & "- Problem statement" & Char(10) & "- Affected users or roles" & Char(10) & "- Business impact and urgency" & Char(10) & "- Expected outcome" & Char(10) & "- Evidence, screenshots, links, or repro steps"
            Visible: =false
            Width: =595
            X: =680
            Y: =520
      - btnSaveDraft:
          Control: ModernButton@1.0.0
          Properties:
            Height: =44
            OnSelect: =Notify("Request draft fields are ready. Connect this screen to Dataverse or SharePoint to submit.", NotificationType.Success)
            Text: ="Save request draft"
            Width: =200
            X: =390
            Y: =590
      - lblConversation:
          Control: ModernText@1.0.0
          Properties:
            Height: =24
            Size: =14
            Text: ="Copilot messages"
            Width: =300
            X: =680
            Y: =520
      - txtAgentTranscript:
          Control: ModernTextInput@1.1.0
          Properties:
            Default: |
              =Coalesce(varConversationLog, "Agent: Tell me what the requester needs. I will ask follow-up questions and fill the intake fields as we go.")
            DisplayMode: =DisplayMode.View
            Height: =82
            Type: =TextInputType.Multiline
            Width: =595
            X: =680
            Y: =548
      - txtAgentMessage:
          Control: ModernTextInput@1.1.0
          Properties:
            Height: =56
            Placeholder: ="Reply to the intake agent"
            Type: =TextInputType.Multiline
            Width: =405
            X: =680
            Y: =640
      - btnSendAgentMessage:
          Control: ModernButton@1.0.0
          Properties:
            Height: =44
            OnSelect: |
              =If(IsBlank(Trim(txtAgentMessage.Text)),
                  Notify("Type a message for the intake agent first.", NotificationType.Warning),
                  Set(varChatText, Trim(txtAgentMessage.Text));
                  Set(varInputText, Lower(varChatText & " " & txtProblem.Text & " " & txtBusinessImpact.Text & " " & txtAdditionalInfo.Text));
                  Set(varCategory, If(IsBlank(Trim(varInputText)), "Needs problem statement", If(Or("login" in varInputText, "access" in varInputText, "permission" in varInputText, "role" in varInputText), "Access / permissions", If(Or("bug" in varInputText, "error" in varInputText, "broken" in varInputText, "fail" in varInputText), "Bug / defect", If(Or("report" in varInputText, "dashboard" in varInputText, "data" in varInputText), "Reporting / data", If(Or("automation" in varInputText, "workflow" in varInputText, "approval" in varInputText), "Automation / workflow", "Enhancement / discovery"))))));
                  Set(varEffort, If(IsBlank(Trim(varInputText)), "", If(Or("outage" in varInputText, "blocked" in varInputText, "urgent" in varInputText, "security" in varInputText), "Large / urgent triage", If(Len(varInputText) > 450, "Medium: 3-5 days", "Small: 1-2 days"))));
                  Set(varTimeline, If(IsBlank(Trim(varInputText)), "", If(Or("urgent" in varInputText, "outage" in varInputText, "blocked" in varInputText), "Start today", If(Len(varInputText) > 450, "This sprint after discovery", "Next available triage slot"))));
                  Set(varQuestion, If(IsBlank(Trim(txtBusinessImpact.Text)), "What business problem does this create, and who is affected?", If(IsBlank(Trim(txtAdditionalInfo.Text)), "Any deadlines, screenshots, links, or examples developers should know about?", "I captured the latest message. Review the auto-filled fields and save the draft.")));
                  Set(varDeveloperNotes, "Developer notes: confirm affected users, repro steps, priority, target system, desired outcome, and deadline. Signals found: " & varCategory & "; " & varEffort & "; " & varTimeline & ". Latest intake message: " & varChatText & ". Extra context: " & txtAdditionalInfo.Text);
                  Set(varConversationLog, Coalesce(varConversationLog, "Agent: Tell me what the requester needs. I will ask follow-up questions and fill the intake fields as we go.") & Char(10) & Char(10) & "You: " & varChatText & Char(10) & "Agent: " & varQuestion);
                  Reset(txtCategory);
                  Reset(txtEffort);
                  Reset(txtTimeline);
                  Reset(txtDeveloperNotes);
                  Reset(txtAgentTranscript);
                  Reset(txtAgentMessage)
              )
            Text: ="Send to agent"
            Width: =175
            X: =1100
            Y: =646
